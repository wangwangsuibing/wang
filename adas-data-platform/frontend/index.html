<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自动驾驶数据采集平台</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <div class="logo">🚘 自动驾驶数据采集平台</div>
  <div class="toolbar">
    <button id="btn-addPoint" class="mode-btn">📍 打点</button>
    <button id="btn-drawPath" class="mode-btn">🛣️ 绘制路径</button>
    <button id="btn-drawFence" class="mode-btn">🚧 电子围栏</button>
    <button id="btn-heatmap" class="mode-btn">🔥 热力图</button>
    <button id="btn-gaps" class="mode-btn">🕳 覆盖缺口</button>
    <select id="point-filter" title="按任务筛选点位"><option value="">全部点位</option></select>
    <button id="btn-stop-replay" style="display:none">⏹ 停止回放</button>
    <span id="mode-tip" class="tip"></span>
    <span id="draw-actions" style="display:none;gap:6px">
      <button id="btn-save-draw">✔ 保存</button>
      <button id="btn-cancel-draw" class="ghost">✖ 取消</button>
    </span>
  </div>
</header>

<div class="layout">
  <div id="map"></div>

  <aside>
    <div class="tabs">
      <div class="tab active" data-panel="panel-dash">📊 概览</div>
      <div class="tab" data-panel="panel-tasks">📤 任务</div>
      <div class="tab" data-panel="panel-data">💾 数据</div>
      <div class="tab" data-panel="panel-report">📈 报表</div>
      <div class="tab" data-panel="panel-vehicles">🚗 车辆</div>
      <div class="tab" data-panel="panel-alerts">⚠️ 告警<span id="alert-badge" class="badge-n">0</span></div>
    </div>

    <div id="panel-dash" class="panel">
      <div class="stat-grid">
        <div class="stat"><div class="k">采集车辆(采集中/总)</div><div class="v" id="stat-vehicles">-</div></div>
        <div class="stat"><div class="k">采集点位</div><div class="v" id="stat-points">-</div></div>
        <div class="stat"><div class="k">采集路线</div><div class="v" id="stat-paths">-</div></div>
        <div class="stat"><div class="k">任务</div><div class="v" id="stat-tasks">-</div></div>
        <div class="stat"><div class="k">轨迹点</div><div class="v" id="stat-tracks">-</div></div>
        <div class="stat"><div class="k">覆盖率</div><div class="v" id="stat-coverage">-</div></div>
        <div class="stat"><div class="k">数据包(质检通过/总)</div><div class="v" id="stat-datasets">-</div></div>
        <div class="stat"><div class="k">数据总量</div><div class="v" id="stat-databytes">-</div></div>
      </div>
      <h3>数据导出</h3>
      <div class="row">
        <button id="btn-export-csv">⬇ 点位 CSV</button>
        <button id="btn-export-geojson">⬇ GeoJSON</button>
      </div>
    </div>

    <div id="panel-tasks" class="panel" style="display:none">
      <h3>新建任务</h3>
      <input id="task-name" placeholder="任务名称，如：晚高峰路口采集">
      <select id="task-vehicle"><option value="">自动分配</option></select>
      <select id="task-path"><option value="">选择路线</option></select>
      <div class="row">
        <select id="task-driver"><option value="">选择采集员</option></select>
        <select id="task-sensor"><option value="">传感器配置</option></select>
      </div>
      <select id="task-priority">
        <option value="low">低优先级</option>
        <option value="normal" selected>中优先级</option>
        <option value="high">高优先级</option>
        <option value="urgent">紧急</option>
      </select>
      <input id="task-event-rules" placeholder="事件触发（可选）：AEB:10:30 = 触发前10s后30s">
      <button id="btn-create-task" class="primary">＋ 创建任务</button>
      <h3>采集活动（批量任务）</h3>
      <input id="camp-name" placeholder="活动名称，如：Q3 雨天专项">
      <div class="row">
        <select id="camp-path"><option value="">选择路线</option></select>
        <select id="camp-sensor"><option value="">传感器配置</option></select>
      </div>
      <div id="camp-vehicles" class="t-meta" style="margin:4px 0"></div>
      <button id="btn-create-camp">＋ 创建活动并批量生成任务</button>
      <h3>任务列表</h3>
      <div id="task-list"></div>
    </div>

    <div id="panel-data" class="panel" style="display:none">
      <h3>新建数据包</h3>
      <input id="ds-name" placeholder="数据包名称，如：晚高峰路口-batch01">
      <select id="ds-task"><option value="">不关联任务</option></select>
      <div class="row">
        <input id="ds-tags" placeholder="标签，逗号分隔：雨天,路口">
        <button id="btn-create-ds" class="primary">＋ 创建</button>
      </div>
      <h3>数据包检索</h3>
      <div class="row">
        <input id="ds-keyword" placeholder="关键字搜索">
        <select id="ds-status-filter">
          <option value="">全部状态</option>
          <option value="uploading">回传中</option>
          <option value="uploaded">已上传</option>
          <option value="qc_passed">质检通过</option>
          <option value="qc_failed">质检未通过</option>
          <option value="archived">已归档</option>
        </select>
      </div>
      <div class="row">
        <select id="ds-tag-filter"><option value="">全部标签</option></select>
        <select id="ds-event-filter">
          <option value="">全部事件</option>
          <option value="manual">手动打标</option>
          <option value="AEB">AEB 触发</option>
          <option value="cutin">切入触发</option>
        </select>
      </div>
      <div id="ds-list"></div>
    </div>

    <div id="panel-vehicles" class="panel" style="display:none">
      <h3>车辆状态</h3>
      <div id="vehicle-list"></div>
      <p class="hint">点击地图上的 🚗 可查看详情并回放轨迹</p>
      <h3>采集员</h3>
      <div id="driver-list"></div>
      <div class="row">
        <input id="drv-name" placeholder="姓名">
        <input id="drv-phone" placeholder="电话">
        <button id="btn-add-driver">＋</button>
      </div>
      <h3>存储水位</h3>
      <div id="storage-box" class="t-meta"></div>
    </div>

    <div id="panel-report" class="panel" style="display:none">
      <h3>近 14 天趋势</h3>
      <div id="report-charts"></div>
      <h3>质检规则配置</h3>
      <div class="row"><label class="t-meta" style="flex:1">丢帧率阈值 %</label><input id="qc-drop" type="number" step="0.1" style="width:80px"></div>
      <div class="row"><label class="t-meta" style="flex:1">时间同步阈值 ms</label><input id="qc-sync" type="number" step="0.5" style="width:80px"></div>
      <div class="row"><label class="t-meta" style="flex:1">及格分数</label><input id="qc-pass" type="number" style="width:80px"></div>
      <button id="qc-save-rules">保存质检规则</button>
      <h3>数据保留策略</h3>
      <div class="row">
        <input id="ret-days" type="number" style="width:80px">
        <span class="t-meta" style="align-self:center">天未消费自动归档</span>
        <button id="ret-save">保存</button>
        <button id="ret-apply" class="ghost">立即执行</button>
      </div>
      <h3>操作审计日志</h3>
      <div id="audit-list" style="max-height:220px;overflow-y:auto"></div>
    </div>

    <div id="panel-alerts" class="panel" style="display:none">
      <h3>告警消息</h3>
      <div id="alert-list"></div>
    </div>
  </aside>
</div>

<!-- point form modal -->
<div id="point-form" class="modal">
  <h3>📍 新增采集点</h3>
  <input id="pf-name" placeholder="点位名称">
  <div class="row">
    <input id="pf-lat" placeholder="纬度" readonly>
    <input id="pf-lng" placeholder="经度" readonly>
  </div>
  <select id="pf-type">
    <option value="poi">兴趣点</option>
    <option value="event">事件点</option>
    <option value="obstacle">障碍物</option>
    <option value="start">起点</option>
    <option value="end">终点</option>
  </select>
  <select id="pf-task"><option value="">不关联任务</option></select>
  <div class="row">
    <select id="pf-weather"><option value="">天气</option><option>晴</option><option>多云</option><option>小雨</option><option>大雨</option><option>雾</option><option>雪</option></select>
    <select id="pf-lighting"><option value="">光照</option><option>白天</option><option>夜间</option><option>黄昏</option><option>逆光</option></select>
    <select id="pf-road"><option value="">路况</option><option>城市道路</option><option>高架</option><option>隧道</option><option>路口</option><option>高速</option><option>停车场</option></select>
  </div>
  <textarea id="pf-note" placeholder="备注" rows="2"></textarea>
  <div class="row">
    <button id="pf-save" class="primary">保存</button>
    <button id="pf-cancel" class="ghost">取消</button>
  </div>
</div>

<!-- attachments modal -->
<div id="att-modal" class="modal">
  <h3 id="att-title">📎 附件</h3>
  <div id="att-list" style="max-height:220px;overflow-y:auto;margin-bottom:8px"></div>
  <input type="file" id="att-file">
  <div class="row">
    <button id="att-upload" class="primary">⬆ 上传</button>
    <button id="att-close" class="ghost">关闭</button>
  </div>
</div>

<!-- dataset detail modal -->
<div id="ds-modal" class="modal" style="width:520px;max-width:92vw">
  <h3 id="ds-title">💾 数据包</h3>
  <div id="ds-meta" class="t-meta" style="margin-bottom:8px"></div>
  <div class="row">
    <select id="ds-priority" style="width:110px">
      <option value="low">低优先级</option>
      <option value="normal">中优先级</option>
      <option value="high">高优先级</option>
    </select>
    <button id="ds-anonymize">🔒 执行脱敏</button>
    <span id="ds-anon-state" class="t-meta" style="align-self:center"></span>
  </div>
  <div class="row">
    <input id="ds-edit-tags" placeholder="标签，逗号分隔">
    <button id="ds-save-tags">保存标签</button>
  </div>
  <div id="ds-qc-report" style="margin:8px 0"></div>
  <h3 style="margin-top:8px">文件列表</h3>
  <div id="ds-files" style="max-height:200px;overflow-y:auto;margin-bottom:8px"></div>
  <input type="file" id="ds-file-input" multiple>
  <div id="ds-upload-progress" style="display:none;margin:6px 0">
    <div style="background:#eee;border-radius:4px;overflow:hidden;height:8px">
      <div id="ds-progress-bar" style="height:8px;width:0;background:#2d8cf0;transition:width .2s"></div>
    </div>
    <small id="ds-progress-text"></small>
  </div>
  <div class="row">
    <button id="ds-upload" class="primary">⬆ 上传文件</button>
    <button id="ds-run-qc">🔍 运行质检</button>
    <button id="ds-close" class="ghost">关闭</button>
  </div>
  <div class="row" style="margin-top:6px">
    <button id="ds-manifest" class="ghost">📄 导出清单</button>
    <button id="ds-zip" class="ghost">📦 打包下载</button>
    <button id="ds-archive" class="ghost">🗄 归档</button>
  </div>
  <h3 style="margin-top:8px">数据血缘（下游消费）</h3>
  <div id="ds-lineage" style="max-height:100px;overflow-y:auto;margin-bottom:6px"></div>
  <div class="row">
    <select id="ds-consumer-type" style="width:110px">
      <option>标注平台</option><option>训练平台</option><option>仿真平台</option><option>外部交付</option>
    </select>
    <input id="ds-consumer-note" placeholder="备注（可选）">
    <button id="ds-add-consumer">＋ 记录</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script src="js/coords.js"></script>
<script src="js/api.js"></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>
</body>
</html>
